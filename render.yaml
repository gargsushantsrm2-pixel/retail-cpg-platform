databases:
  - name: retail-cpg-db
    databaseName: cpg_platform
    user: cpg_user
    plan: free

services:
  - type: web
    name: retail-cpg-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retail-cpg-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: API_SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: retail-cpg-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://retail-cpg-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
